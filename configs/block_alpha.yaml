# Difficulty-graded test bed: far-apart rectangle gadgets (block_alpha).
# `alpha` sweeps ruggedness of the near-optimum spectrum (small alpha = many near-ties
# just above OPT = harder to single out the optimum; large alpha = isolated optimum).
# `stakes_S` sets RAND/OPT (how much an average mistake costs). All three mechanisms.
name: block_alpha
n: 20
num_instances: 30
families:
  - name: block_alpha
    count: 30
    alpha: 0.5
    stakes_S: 5.0
  - name: block_alpha
    count: 30
    alpha: 1.0
    stakes_S: 5.0
  - name: block_alpha
    count: 30
    alpha: 2.0
    stakes_S: 5.0
  - name: block_alpha
    count: 30
    alpha: 3.0
    stakes_S: 5.0
mechanisms:
  - name: local
  - name: auction
    m: 3
    alpha: 0.1
  - name: dual_sinkhorn
    beta: 5.0
    B: 2.0        # clip bound; must exceed the discriminating cost scale
    num_iters: 50
epsilons: [0.1, 0.5, 1.0, 2.0, 5.0, 10.0]
num_trials: 30
base_seed: 7
L_type: diam
parallel: true
max_workers: 4    # raise toward your CPU core count for more speed
